# Release Preparation Workflow for Smooth Search WordPress Plugin
#
# Triggers:
#   - Automatically on push/PR to release/** branches
#   - Manually via GitHub UI or local CLI:
#
#   gh workflow run release-preparation.yml \
#     --field release_version=1.2.0 \
#     --field release_type=minor \
#     --field dry_run=false
#
# Required Secrets:
#   - OPENROUTER_API_KEY  (free tier: https://openrouter.ai)
#   - NOTION_API_KEY
#   - NOTION_DATABASE_ID

name: Release Preparation

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 1.0.0)"
        required: false
        type: string
      release_type:
        description: "Release type"
        required: false
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry_run:
        description: "Dry run - skip Notion publishing"
        required: false
        type: boolean
        default: false
  push:
    branches:
      - 'release/**'
  pull_request:
    branches:
      - 'release/**'

permissions:
  contents: write
  pull-requests: write
  issues: read

env:
  REPO_NAME: smooth-search

jobs:
  prepare:
    name: Prepare Release Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      release_type: ${{ steps.resolve.outputs.release_type }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - name: Resolve version and parameters
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.release_version }}" ]; then
            VERSION="${{ github.event.inputs.release_version }}"
            RELEASE_TYPE="${{ github.event.inputs.release_type }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            # Extract from branch name: refs/heads/release/1.2.3 or release/1.2.3
            BRANCH="${{ github.head_ref || github.ref_name }}"
            VERSION=$(echo "$BRANCH" | sed 's|release/||')
            RELEASE_TYPE="patch"
            DRY_RUN="false"
          fi
          echo "Resolved version: $VERSION"
          echo "Release type: $RELEASE_TYPE"
          echo "Dry run: $DRY_RUN"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT

  # build-analysis:  # TODO: re-enable once build environment is configured
